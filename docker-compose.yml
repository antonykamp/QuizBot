services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quizbot
      POSTGRES_PASSWORD: quizbot
      POSTGRES_DB: quizbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  bot:
    build: .
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://quizbot:quizbot@db:5432/quizbot

volumes:
  pgdata:
